<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BlazeUp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo.png" alt="BlazeUp Logo" class="logo-img" />
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li id="nav-dashboard" style="display:none"><a href="dashboard.html">Dashboard</a></li>
      <li id="nav-admin" style="display:none"><a href="admin.html">Admin</a></li>
      <li id="nav-login"><a href="login.html">Login</a></li>
      <li id="nav-register"><a href="register.html" class="active">Register</a></li>
      <li id="nav-logout" style="display:none">
        <a href="#" onclick="logout()">Logout</a>
      </li>
    </ul>
  </nav>

  <!-- ══════════════════════════════════════════
       REGISTER FORM
  ══════════════════════════════════════════ -->
  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-header">
        <h1>Create an account</h1>
        <p>Join BlazeUp and get your referral code</p>
      </div>

      <!-- onsubmit calls registerUser() in main.js -->
      <form id="register-form" onsubmit="registerUser(event)">

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            minlength="6"
            required
          />
        </div>

        <!-- Optional referral code field -->
        <div class="form-group">
          <label for="referralCode">
            Referral Code
            <span class="optional-label">(optional)</span>
          </label>
          <input
            type="text"
            id="referralCode"
            name="referralCode"
            placeholder="Enter a friend's code"
            maxlength="8"
            style="text-transform: uppercase;"
          />
          <small class="form-hint">Have a friend's referral code? Enter it here!</small>
        </div>

        <!-- Error box — shown if something goes wrong -->
        <div id="error-message" class="error-box" style="display:none"></div>

        <!-- Success box — shown on successful registration -->
        <div id="success-message" class="success-box" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
          Create Account
        </button>

      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Log in here</a>
      </p>

    </div>
  </main>

  <script src="js/main.js"></script>

</body>
</html>
